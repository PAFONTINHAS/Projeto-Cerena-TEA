<main>
    <div class="contatos-container">

        <div class="contatos-information">

            <div class="contatos-information-direction">
                <span class="contact-topic">Contatos</span>
                <span class="contact-title">Tem alguma pergunta?</span>
                <div class="contato-direction-content">
                    <span>Entre em contato sempre que tiver alugma dúvida. Estamos sempre aqui para você!</span>
                </div>
            </div>

            <div class="contatos-information-options">
                <div class="contato-email">
                    <span class="contact-topic">Email</span>
                    <span class="contact-object redirect" (click)="redirectToEmail()" >cerenasupervisaorecepcao@cerenatea.com.br</span>
                </div>

                <div class="contato-telefone">
                    <span class="contact-topic">Telefone</span>
                    <ul class="contact-object">
                        <li><span class="redirect" (click)="redirectToTelephone('(41) 3024-1691')">(41) 3024-1691</span></li>
                        <li><span class="redirect" (click)="redirectToTelephone('(41) 99967-1416')">(41) 99967-1416</span></li>
                    </ul>
                </div>

                <div class="contato-pessoal">
                    <span class="contact-topic">Endereço</span>
                    <span class="contact-object">R. XV de Novembro, 3112 - Alto da XV, Curitiba - PR, Brasil</span>
                </div>

            </div>


        </div>

        <div class="contatos-forms">

            <form action="">

                <div class="input-group">
                    <label for="nome">Nome completo:</label>
                    <input type="text" name="nome"  [(ngModel)]="contato.nome"  placeholder="Digite seu nome completo">
                </div>
                <div class="input-group">
                    <label for="email">Endereço de e-mail:</label>
                    <input type="email" name="email" [(ngModel)]="contato.email" placeholder="exemplo@exemplo.com">
                </div>
                <div class="input-group">
                    <label for="telefone">Telefone:</label>
                    <input type="tel" name="telefone" [(ngModel)]="contato.telefone" placeholder="(41) 91234-5678" mask="(00) 00000-0000" >
                </div>
                <div class="input-group">
                    <label for="obs">Observações:</label>
                    <textarea name="obs" class="obs" [(ngModel)]="contato.observacoes" placeholder="Eu tenho uma dúvida sobre..."></textarea>
                </div>

                
            </form>
            <button class="btn-enviar" (click)="enviarEmail()">ENVIAR </button>

        </div>
        
    </div>
</main>
